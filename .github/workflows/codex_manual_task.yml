name: Codex Manual Task

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref to work on"
        required: true
        default: "integration"
      prompt_file:
        description: "Prompt file in repository"
        required: true
        default: ".github/codex/prompts/repo_audit.md"

jobs:
  codex_task:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Run Codex task
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ inputs.prompt_file }}
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Upload Codex output
        uses: actions/upload-artifact@v4
        with:
          name: codex-task-output
          path: codex-output.md