name: Minimal CI

on:
  workflow_dispatch:
  push:
    branches:
      - integration
      - main
    paths:
      - "automation/**"
      - "docs/**"
      - "game/tales-of-dusk/**"
      - ".github/workflows/ci_minimal.yml"
      - "README.md"
      - "AGENTS.md"
  pull_request:
    branches:
      - integration
      - main
    paths:
      - "automation/**"
      - "docs/**"
      - "game/tales-of-dusk/**"
      - ".github/workflows/ci_minimal.yml"
      - "README.md"
      - "AGENTS.md"

permissions:
  contents: read

concurrency:
  group: ci-minimal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: automation/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install automation dependencies
        run: pip install -r automation/requirements.txt

      - name: Validate protocol/state baseline
        run: python -m automation.scripts.validate_protocols

      - name: Run minimal orchestrator
        run: python -m automation.scripts.run_minimal_orchestrator

      - name: Run repository smoke checks
        run: python -m automation.scripts.ci_repo_smoke

      - name: Run LangGraph/schema tests
        run: pytest automation/langgraph/tests -q

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-minimal-debug
          path: |
            README.md
            automation/
            docs/
            .github/workflows/ci_minimal.yml